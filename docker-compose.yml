name: infra

services:
  #==================MASTER==============
  gym-master:
    image: docker.io/library/postgres:16
    container_name: gym-master
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USERNAME: ${APP_DB_USERNAME}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      TEST_DB_NAME: ${TEST_DB_NAME}
    ports:
      - "5433:5432"
    networks:
      - gym-crm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - master_data:/var/lib/postgresql/data
      - ./infra/init-master.sh:/docker-entrypoint-initdb.d/init-master.sh:ro
      - ./infra/schema.sql:/schema.sql:ro
      - ./infra/data.sql:/data.sql:ro

  #==================REPLICA==============
  gym-replica:
    image: docker.io/library/postgres:16
    container_name: gym-replica
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - gym-crm-net
    depends_on:
      gym-master:
        condition: service_healthy
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./infra/init-replica.sh:/init-replica.sh:ro
    entrypoint: ["bash", "/init-replica.sh"]

  #==================PGPOOL==============
  gym-pgpool:
    image: docker.io/bitnamilegacy/pgpool
    container_name: gym-pgpool
    ports:
      - "5435:5432"
    networks:
      - gym-crm-net
    environment:
      - PGPOOL_BACKEND_NODES=${PGPOOL_BACKEND_NODES}
      - PGPOOL_ENABLE_LOAD_BALANCING=${PGPOOL_ENABLE_LOAD_BALANCING}
      - PGPOOL_SR_CHECK_USER=${PGPOOL_SR_CHECK_USER}
      - PGPOOL_SR_CHECK_PASSWORD=${POSTGRES_ROOT_PASSWORD}
      - PGPOOL_POSTGRES_USERNAME=${APP_DB_USERNAME}
      - PGPOOL_POSTGRES_PASSWORD=${APP_DB_PASSWORD}
      - PGPOOL_ADMIN_USERNAME=${ADMIN_USERNAME}
      - PGPOOL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      gym-master:
        condition: service_healthy
      gym-replica:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/5432'"]
      interval: 5s
      timeout: 5s
      retries: 10

#==================REDIS=================

  gym-redis:
    image: docker.io/library/redis:7-alpine
    container_name: gym-redis
    ports:
      - "6379:6379"
    networks:
      - gym-crm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

#================ActiveMQ===============

  gym-activemq:
    image: docker.io/apache/activemq-classic:latest
    container_name: gym-activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    networks:
      - gym-crm-net
    healthcheck:
      test: [ "CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/61616'" ]
      interval: 5s
      timeout: 5s
      retries: 12

#================MONGO_DB==============

  gym-mongo:
    image: docker.io/library/mongo:7
    container_name: gym-mongo
    ports:
      - "27017:27017"
    networks:
      - gym-crm-net
    volumes:
      - trainer_workload_mongo_data:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

#==================APP=================

  eureka:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: gym-eureka
    ports:
      - "8761:8761"
    networks:
      - gym-crm-net
    volumes:
      - eureka_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/8761'"]
      interval: 5s
      timeout: 5s
      retries: 12

  gym-app:
    build:
      context: ./gym-crm-system
      dockerfile: Dockerfile
    container_name: gym-app
    ports:
      - "8080:8080"
    networks:
      - gym-crm-net
    volumes:
      - gym_crm_system_logs:/app/logs
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TOKEN_LIFETIME: ${JWT_TOKEN_LIFETIME}
      LOGIN_MAX_FAILED_ATTEMPTS: ${LOGIN_MAX_FAILED_ATTEMPTS}
      LOGIN_LOCK_DURATION: ${LOGIN_LOCK_DURATION}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CORS_ALLOWED_METHODS: ${CORS_ALLOWED_METHODS}
      CORS_ALLOWED_HEADERS: ${CORS_ALLOWED_HEADERS}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS}
      CORS_MAX_AGE: ${CORS_MAX_AGE}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
      TRAINER_WORKLOAD_CONNECT_TIMEOUT: ${TRAINER_WORKLOAD_CONNECT_TIMEOUT}
      TRAINER_WORKLOAD_READ_TIMEOUT: ${TRAINER_WORKLOAD_READ_TIMEOUT}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION}
      ACTIVE_MQ_BROKER_URL: ${ACTIVE_MQ_BROKER_URL:-tcp://gym-activemq:61616}
      ACTIVE_MQ_USER: ${ACTIVE_MQ_USER:-admin}
      ACTIVE_MQ_PASSWORD: ${ACTIVE_MQ_PASSWORD:-admin}
      TRAINER_WORKLOAD_EVENTS_QUEUE: ${TRAINER_WORKLOAD_EVENTS_QUEUE:-trainer.workload.events}
    depends_on:
      gym-pgpool:
        condition: service_healthy
      gym-redis:
        condition: service_healthy
      eureka:
        condition: service_healthy
      gym-activemq:
        condition: service_healthy

  trainer-workload:
    build:
      context: ./trainer-workload
      dockerfile: Dockerfile
    container_name: gym-trainer-workload
    ports:
      - "8081:8081"
    networks:
      - gym-crm-net
    volumes:
      - trainer_workload_logs:/app/logs
    environment:
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
      SPRING_DATA_MONGODB_URI: ${TRAINER_WORKLOAD_MONGODB_URI:-mongodb://gym-mongo:27017/trainer_workload}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_SECRET: ${JWT_SECRET}
      ACTIVE_MQ_BROKER_URL: ${ACTIVE_MQ_BROKER_URL:-tcp://gym-activemq:61616}
      ACTIVE_MQ_USER: ${ACTIVE_MQ_USER:-admin}
      ACTIVE_MQ_PASSWORD: ${ACTIVE_MQ_PASSWORD:-admin}
      TRAINER_WORKLOAD_EVENTS_QUEUE: ${TRAINER_WORKLOAD_EVENTS_QUEUE:-trainer.workload.events}
      TRAINER_WORKLOAD_EVENTS_DLQ: ${TRAINER_WORKLOAD_EVENTS_DLQ:-trainer.workload.events.dlq}
      TRAINER_WORKLOAD_LISTENER_CONCURRENCY: ${TRAINER_WORKLOAD_LISTENER_CONCURRENCY:-2-5}
      TRAINER_WORKLOAD_REDELIVERY_MAX_ATTEMPTS: ${TRAINER_WORKLOAD_REDELIVERY_MAX_ATTEMPTS:-3}
      TRAINER_WORKLOAD_REDELIVERY_INITIAL_DELAY: ${TRAINER_WORKLOAD_REDELIVERY_INITIAL_DELAY:-1000}
      TRAINER_WORKLOAD_REDELIVERY_USE_EXPONENTIAL_BACKOFF: ${TRAINER_WORKLOAD_REDELIVERY_USE_EXPONENTIAL_BACKOFF:-true}
      TRAINER_WORKLOAD_REDELIVERY_BACKOFF_MULTIPLIER: ${TRAINER_WORKLOAD_REDELIVERY_BACKOFF_MULTIPLIER:-2.0}
    depends_on:
      eureka:
        condition: service_healthy
      gym-activemq:
        condition: service_healthy
      gym-mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/8081'"]
      interval: 5s
      timeout: 5s
      retries: 12

#==================MONITORING=================

  loki:
    image: docker.io/grafana/loki:latest
    container_name: gym-loki
    ports:
      - "3100:3100"
    networks:
      - gym-crm-net
    volumes:
      - ./infra/monitoring/loki/loki.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/local-config.yml"

  alloy:
    image: docker.io/grafana/alloy:latest
    container_name: gym-alloy
    ports:
      - "12345:12345"
    networks:
      - gym-crm-net
    volumes:
      - ./infra/monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
      - eureka_logs:/var/log/gym/eureka:ro
      - gym_crm_system_logs:/var/log/gym/gym-crm-system:ro
      - trainer_workload_logs:/var/log/gym/trainer-workload:ro
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "--storage.path=/var/lib/alloy/data"
      - "/etc/alloy/config.alloy"
    depends_on:
      - loki

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: gym-prometheus
    ports:
      - "9090:9090"
    networks:
      - gym-crm-net
    volumes:
      - ./infra/monitoring/prometheus/${PROMETHEUS_CONFIG}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    container_name: gym-grafana
    ports:
      - "3000:3000"
    networks:
      - gym-crm-net
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: ${GF_USERS_ALLOW_SIGN_UP}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

networks:
  gym-crm-net:
    driver: bridge

volumes:
  master_data:
  replica_data:
  eureka_logs:
  gym_crm_system_logs:
  trainer_workload_logs:
  trainer_workload_mongo_data:
  loki_data:
  alloy_data:
  prometheus_data:
  grafana_data:
