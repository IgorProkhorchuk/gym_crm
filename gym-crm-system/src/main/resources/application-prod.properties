spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/gym_crm}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gym_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate

management.endpoint.health.show-details=never

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka:8761/eureka/}
