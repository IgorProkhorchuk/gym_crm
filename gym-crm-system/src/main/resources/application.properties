spring.application.name=gym-crm-system
spring.profiles.default=prod
spring.mvc.servlet.path=/api
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.schema.core-tables=users,trainees,trainers,training_types,trainings

password.length=10
password.alphabet=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789

security.jwt.issuer=${JWT_ISSUER:https://gym-crm.local}
security.jwt.secret=${JWT_SECRET:GymCrmLocalDevelopmentJwtSecretKeyMustBeAtLeastThirtyTwoBytes}
security.jwt.token-lifetime=${JWT_TOKEN_LIFETIME:PT30M}

security.login-attempt.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:3}
security.login-attempt.lock-duration=${LOGIN_LOCK_DURATION:PT5M}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}
security.cors.max-age=${CORS_MAX_AGE:PT1H}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

lombok.addLombokGeneratedAnnotation=true

eureka.instance.prefer-ip-address=true

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

resilience4j.circuitbreaker.instances.trainerWorkload.sliding-window-size=${TRAINER_WORKLOAD_CB_SLIDING_WINDOW_SIZE:5}
resilience4j.circuitbreaker.instances.trainerWorkload.minimum-number-of-calls=${TRAINER_WORKLOAD_CB_MINIMUM_CALLS:3}
resilience4j.circuitbreaker.instances.trainerWorkload.failure-rate-threshold=${TRAINER_WORKLOAD_CB_FAILURE_RATE_THRESHOLD:50}
resilience4j.circuitbreaker.instances.trainerWorkload.wait-duration-in-open-state=${TRAINER_WORKLOAD_CB_OPEN_WAIT_DURATION:30s}
resilience4j.circuitbreaker.instances.trainerWorkload.permitted-number-of-calls-in-half-open-state=${TRAINER_WORKLOAD_CB_HALF_OPEN_CALLS:2}

trainer-workload.outbox.dispatcher.initial-delay=${TRAINER_WORKLOAD_OUTBOX_INITIAL_DELAY:10000}
trainer-workload.outbox.dispatcher.fixed-delay=${TRAINER_WORKLOAD_OUTBOX_FIXED_DELAY:10000}
