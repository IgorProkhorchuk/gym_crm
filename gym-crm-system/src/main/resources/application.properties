spring.application.name=gym-crm-system
spring.profiles.default=prod
spring.mvc.servlet.path=/api
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.health.schema.core-tables=users,trainees,trainers,training_types,trainings

password.length=10
password.alphabet=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789

security.jwt.issuer=${JWT_ISSUER:https://gym-crm.local}
security.jwt.secret=${JWT_SECRET:GymCrmLocalDevelopmentJwtSecretKeyMustBeAtLeastThirtyTwoBytes}
security.jwt.token-lifetime=${JWT_TOKEN_LIFETIME:PT30M}

security.login-attempt.max-failed-attempts=${LOGIN_MAX_FAILED_ATTEMPTS:3}
security.login-attempt.lock-duration=${LOGIN_LOCK_DURATION:PT5M}

security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080}
security.cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
security.cors.allowed-headers=${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
security.cors.allow-credentials=${CORS_ALLOW_CREDENTIALS:false}
security.cors.max-age=${CORS_MAX_AGE:PT1H}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

lombok.addLombokGeneratedAnnotation=true

eureka.instance.prefer-ip-address=true
