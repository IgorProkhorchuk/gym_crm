services:
  #==================MASTER==============
  gym-master:
    image: docker.io/library/postgres:16
    container_name: gym-master
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-password}
      REPL_PASSWORD: ${REPL_PASSWORD:-repl_password}
      APP_DB_NAME: ${APP_DB_NAME:-gym_crm}
      APP_DB_USERNAME: ${APP_DB_USERNAME:-gym_user}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-password}
      TEST_DB_NAME: ${TEST_DB_NAME:-gym_crm_test}
    ports:
      - "5433:5432"
    networks:
      - gym-crm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - master_data:/var/lib/postgresql/data
      - ./init-master.sh:/docker-entrypoint-initdb.d/init-master.sh:ro
      - ./schema.sql:/schema.sql:ro
      - ./data.sql:/data.sql:ro

  #==================REPLICA==============
  gym-replica:
    image: docker.io/library/postgres:16
    container_name: gym-replica
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-password}
      REPL_PASSWORD: ${REPL_PASSWORD:-repl_password}
    ports:
      - "5434:5432"
    networks:
      - gym-crm-net
    depends_on:
      gym-master:
        condition: service_healthy
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./init-replica.sh:/init-replica.sh:ro
    entrypoint: ["bash", "/init-replica.sh"]

  #==================PGPOOL==============
  gym-pgpool:
    image: docker.io/bitnamilegacy/pgpool
    container_name: gym-pgpool
    ports:
      - "5435:5432"
    networks:
      - gym-crm-net
    environment:
      - PGPOOL_BACKEND_NODES=0:gym-master:5432,1:gym-replica:5432
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=${POSTGRES_ROOT_PASSWORD:-password}
      - PGPOOL_POSTGRES_USERNAME=${APP_DB_USERNAME:-gym_user}
      - PGPOOL_POSTGRES_PASSWORD=${APP_DB_PASSWORD:-password}
      - PGPOOL_ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - PGPOOL_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    depends_on:
      gym-master:
        condition: service_healthy
      gym-replica:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/5432'"]
      interval: 5s
      timeout: 5s
      retries: 10

#==================APP=================

  gym-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: gym-app
    ports:
      - "8080:8080"
    networks:
      - gym-crm-net
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://gym-pgpool:5432/gym_crm
      SPRING_DATASOURCE_USERNAME: ${APP_DB_USERNAME:-gym_user}
      SPRING_DATASOURCE_PASSWORD: ${APP_DB_PASSWORD:-password}
    depends_on:
      gym-pgpool:
        condition: service_healthy

#==================MONITORING=================

  prometheus:
    image: docker.io/prom/prometheus:latest
    container_name: gym-prometheus
    ports:
      - "9090:9090"
    networks:
      - gym-crm-net
    volumes:
      - ./monitoring/prometheus/${PROMETHEUS_CONFIG:-prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  grafana:
    image: docker.io/grafana/grafana-oss:latest
    container_name: gym-grafana
    ports:
      - "3000:3000"
    networks:
      - gym-crm-net
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

networks:
  gym-crm-net:
    driver: bridge

volumes:
  master_data:
  replica_data:
  prometheus_data:
  grafana_data:
