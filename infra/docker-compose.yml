services:
  #==================MASTER==============
  gym-master:
    image: docker.io/library/postgres:16
    container_name: gym-master
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
      APP_DB_NAME: ${APP_DB_NAME}
      APP_DB_USERNAME: ${APP_DB_USERNAME}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      TEST_DB_NAME: ${TEST_DB_NAME}
    ports:
      - "5433:5432"
    networks:
      - gym-crm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - master_data:/var/lib/postgresql/data
      - ./init-master.sh:/docker-entrypoint-initdb.d/init-master.sh:ro

  #==================REPLICA==============
  gym-replica:
    image: docker.io/library/postgres:16
    container_name: gym-replica
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      REPL_PASSWORD: ${REPL_PASSWORD}
    ports:
      - "5434:5432"
    networks:
      - gym-crm-net
    depends_on:
      gym-master:
        condition: service_healthy
    volumes:
      - replica_data:/var/lib/postgresql/data
      - ./init-replica.sh:/init-replica.sh:ro
    entrypoint: ["bash", "/init-replica.sh"]

  #==================PGPOOL==============
  gym-pgpool:
    image: docker.io/bitnamilegacy/pgpool
    container_name: gym-pgpool
    ports:
      - "5435:5432"
    networks:
      - gym-crm-net
    environment:
      - PGPOOL_BACKEND_NODES=0:gym-master:5432,1:gym-replica:5432
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=${POSTGRES_ROOT_PASSWORD}
      - PGPOOL_POSTGRES_USERNAME=${APP_DB_USERNAME}
      - PGPOOL_POSTGRES_PASSWORD=${APP_DB_PASSWORD}
      - PGPOOL_ADMIN_USERNAME=${ADMIN_USERNAME}
      - PGPOOL_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    depends_on:
      gym-master:
        condition: service_healthy
      gym-replica:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -ec ': > /dev/tcp/127.0.0.1/5432'"]
      interval: 5s
      timeout: 5s
      retries: 10

  #==================APP=================
  gym-app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: localhost/gym-crm:local
    container_name: gym-app
    environment:
      DB_URL: jdbc:postgresql://gym-pgpool:5432/${APP_DB_NAME}
      DB_USERNAME: ${APP_DB_USERNAME}
      DB_PASSWORD: ${APP_DB_PASSWORD}
      DB_DRIVER: org.postgresql.Driver
    networks:
      - gym-crm-net
    depends_on:
      gym-pgpool:
        condition: service_healthy
    restart: "no"

networks:
  gym-crm-net:
    driver: bridge

volumes:
  master_data:
  replica_data:
