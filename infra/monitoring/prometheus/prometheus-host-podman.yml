global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gym-crm-system
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - host.containers.internal:8080

  - job_name: gym-crm-trainer-workload
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - host.containers.internal:8081
