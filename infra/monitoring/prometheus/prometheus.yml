global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gym-crm-system
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - gym-app:8080

  - job_name: gym-crm-trainer-workload
    metrics_path: /api/actuator/prometheus
    static_configs:
      - targets:
          - trainer-workload:8081

  - job_name: gym-mongo
    static_configs:
      - targets:
          - gym-mongodb-exporter:9216
