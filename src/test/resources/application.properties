password.length=10
password.alphabet=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789
security.jwt.issuer=https://gym-crm.test
security.jwt.secret=GymCrmTestJwtSecretKeyMustBeAtLeastThirtyTwoBytes
security.jwt.token-lifetime=PT30M
security.login-attempt.max-failed-attempts=3
security.login-attempt.lock-duration=PT5M
lombok.addLombokGeneratedAnnotation=true

spring.jpa.open-in-view=false
spring.mvc.servlet.path=/api
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.hbm2ddl.import_files=data.sql
management.health.schema.core-tables=users,trainees,trainers,training_types,trainings
