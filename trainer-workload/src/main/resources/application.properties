server.port=8081
spring.application.name=trainer-workload
spring.mvc.servlet.path=/api

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:h2:mem:trainer_workload;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=true
trainer-workload.h2.tcp.enabled=${TRAINER_WORKLOAD_H2_TCP_ENABLED:false}
trainer-workload.h2.tcp.port=${TRAINER_WORKLOAD_H2_TCP_PORT:9092}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.issuer=${JWT_ISSUER:https://gym-crm.local}
security.jwt.secret=${JWT_SECRET:GymCrmLocalDevelopmentJwtSecretKeyMustBeAtLeastThirtyTwoBytes}

spring.banner.location=classpath:trainer-workload-banner.txt
application.version=@project.version@
spring-cloud.version=@spring-cloud.version@
