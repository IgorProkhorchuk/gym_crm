server.port=8081
spring.application.name=trainer-workload
spring.mvc.servlet.path=/api

eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:h2:mem:trainer_workload;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.jpa.show-sql=true
trainer-workload.h2.tcp.enabled=${TRAINER_WORKLOAD_H2_TCP_ENABLED:false}
trainer-workload.h2.tcp.port=${TRAINER_WORKLOAD_H2_TCP_PORT:9092}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
springdoc.swagger-ui.path=/swagger-ui.html

security.jwt.issuer=${JWT_ISSUER:https://gym-crm.local}
security.jwt.secret=${JWT_SECRET:GymCrmLocalDevelopmentJwtSecretKeyMustBeAtLeastThirtyTwoBytes}

spring.banner.location=classpath:trainer-workload-banner.txt
application.version=@project.version@
spring-cloud.version=@spring-cloud.version@

spring.activemq.broker-url=${ACTIVE_MQ_BROKER_URL:tcp://localhost:61616}
spring.activemq.user=${ACTIVE_MQ_USER:admin}
spring.activemq.password=${ACTIVE_MQ_PASSWORD:admin}
spring.jms.pub-sub-domain=false

trainer-workload.messaging.queue=${TRAINER_WORKLOAD_EVENTS_QUEUE:trainer.workload.events}
trainer-workload.messaging.dead-letter-queue=${TRAINER_WORKLOAD_EVENTS_DLQ:trainer.workload.events.dlq}
trainer-workload.messaging.listener.concurrency=${TRAINER_WORKLOAD_LISTENER_CONCURRENCY:2-5}
trainer-workload.messaging.redelivery.maximum-redeliveries=${TRAINER_WORKLOAD_REDELIVERY_MAX_ATTEMPTS:3}
trainer-workload.messaging.redelivery.initial-redelivery-delay=${TRAINER_WORKLOAD_REDELIVERY_INITIAL_DELAY:1000}
trainer-workload.messaging.redelivery.use-exponential-back-off=${TRAINER_WORKLOAD_REDELIVERY_USE_EXPONENTIAL_BACKOFF:true}
trainer-workload.messaging.redelivery.back-off-multiplier=${TRAINER_WORKLOAD_REDELIVERY_BACKOFF_MULTIPLIER:2.0}
