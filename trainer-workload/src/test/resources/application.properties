eureka.client.enabled=false
security.jwt.issuer=https://gym-crm.test
security.jwt.secret=GymCrmTestJwtSecretKeyMustBeAtLeastThirtyTwoBytes

spring.jms.listener.auto-startup=false
trainer-workload.messaging.queue=trainer.workload.events
trainer-workload.messaging.dead-letter-queue=trainer.workload.events.dlq
trainer-workload.messaging.listener.concurrency=1
trainer-workload.messaging.redelivery.maximum-redeliveries=3
trainer-workload.messaging.redelivery.initial-redelivery-delay=1000
trainer-workload.messaging.redelivery.use-exponential-back-off=true
trainer-workload.messaging.redelivery.back-off-multiplier=2.0

spring.mongodb.uri=mongodb://localhost:27017/trainer_workload_test
spring.data.mongodb.auto-index-creation=true
